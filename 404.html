<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Топ 5 рецептов</title>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .big-404 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(7rem, 22vw, 18rem);
            font-weight: 700;
            line-height: 1;
            color: #f97316;
            opacity: 0.12;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -52%);
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.05em;
        }

        .content-404 {
            position: relative;
            z-index: 10;
            animation: fadeSlideUp 0.8s ease both;
        }

        .emoji-404 {
            font-size: 5rem;
            margin-bottom: 0.75rem;
            display: block;
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {

            0%,
            100% {
                transform: rotate(-4deg);
            }

            50% {
                transform: rotate(4deg);
            }
        }

        .title-404 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #4a2c2a;
            margin-bottom: 0.75rem;
        }

        .dark .title-404 {
            color: #f5f5f5;
        }

        .sub-404 {
            color: #78716c;
            font-size: 1.05rem;
            max-width: 380px;
            margin: 0 auto 2rem;
            line-height: 1.65;
        }

        .dark .sub-404 {
            color: #9ca3af;
        }

        .btn-group-404 {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
    </style>
</head>

<body>
    <header class="bg-orange-500 text-white p-6 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-4xl font-bold">Топ 5 рецептов</h1>
            <button id="menu-toggle" class="sm:hidden text-white" aria-label="Открыть меню">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <nav id="nav-menu" class="hidden sm:flex sm:space-x-6 items-center">
                <ul class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                    <li><a href="index.html" class="hover:underline text-lg">Главная</a></li>
                    <li><a href="index.html#recipes" class="hover:underline text-lg">Рецепты</a></li>
                    <li><a href="favorites.html" class="nav-fav-link hover:underline text-lg">Избранное</a></li>
                </ul>
                <button id="theme-toggle" class="ml-4 bg-orange-600 text-white px-4 py-2 rounded-full">Темная
                    тема</button>
            </nav>
        </div>
    </header>

    <main class="page-404">
        <span class="big-404" aria-hidden="true">404</span>
        <div class="content-404">
            <span class="emoji-404">🍽️</span>
            <h2 class="title-404">Страница не найдена</h2>
            <p class="sub-404">
                Кажется, этот рецепт потерялся где-то на кухне.<br>
                Но не расстраивайтесь — у нас есть ещё много вкусного!
            </p>
            <div class="btn-group-404">
                <a href="index.html" class="main-hero-cta">← На главную</a>
                <a href="index.html#recipes"
                    class="inline-block bg-white text-orange-500 border-2 border-orange-500 font-bold text-[1.05rem] px-8 py-3 rounded-full hover:bg-orange-50 transition">
                    К рецептам
                </a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>

</html>
